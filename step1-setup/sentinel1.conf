# Sentinel 1 설정
# redis-master 컨테이너를 모니터링
# quorum: 과반수 (3개 중 2개 동의 시 장애 선언)

sentinel monitor mymaster redis-master 6379 2

# Master 응답 없음 판단 시간 (5초)
sentinel down-after-milliseconds mymaster 5000

# Failover 타임아웃 (60초)
sentinel failover-timeout mymaster 60000

# Failover 후 동시에 동기화할 Replica 수
sentinel parallel-syncs mymaster 1

# Sentinel 포트
port 26379

# 로그 레벨
loglevel notice

# Docker 컨테이너 이름(hostname)을 IP로 고정하지 않고 DNS로 계속 해석
# redis-master, redis-replica-1 같은 이름을 Sentinel 간 통신에서도 올바르게 사용
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
